<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <linearGradient id="gloom" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#166534"/></linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#166534"/><stop offset="100%" stop-color="#0a2e1a"/></linearGradient>
    <linearGradient id="low" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a2e1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" rx="12" fill="#12121a"/>

  <!-- Region boxes -->
  <!-- Gloomrot (North) -->
  <rect x="180" y="20" width="240" height="60" rx="8" fill="url(#gloom)" stroke="#4ade80" stroke-width="2" filter="url(#glow)"/>
  <text x="300" y="48" text-anchor="middle" fill="#fff" font-family="Orbitron, sans-serif" font-size="14" font-weight="700">Gloomrot</text>
  <text x="300" y="66" text-anchor="middle" fill="#a7f3d0" font-size="11">GS 80-91 · Endgame</text>

  <!-- Arrow Gloom → Dunley -->
  <line x1="300" y1="82" x2="300" y2="118" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4ade80"/></marker></defs>

  <!-- Silverlight (NW) -->
  <rect x="30" y="120" width="180" height="70" rx="8" fill="url(#mid)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="120" y="150" text-anchor="middle" fill="#4ade80" font-family="Orbitron, sans-serif" font-size="13" font-weight="700">Silverlight Hills</text>
  <text x="120" y="172" text-anchor="middle" fill="#a7f3d0" font-size="11">GS 65-80 · Holy danger</text>

  <!-- Arrow Silver → Dunley -->
  <line x1="212" y1="155" x2="248" y2="155" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dunley (Central, highlighted) -->
  <rect x="250" y="115" width="200" height="80" rx="8" fill="url(#gloom)" stroke="#4ade80" stroke-width="2.5" filter="url(#glow)"/>
  <text x="350" y="145" text-anchor="middle" fill="#fff" font-family="Orbitron, sans-serif" font-size="15" font-weight="700">★ Dunley Farmlands</text>
  <text x="350" y="165" text-anchor="middle" fill="#a7f3d0" font-size="11">GS 20-50 · Central Hub</text>
  <text x="350" y="182" text-anchor="middle" fill="#4ade80" font-size="10">Best base location</text>

  <!-- Arrow Dunley → Cursed -->
  <line x1="452" y1="155" x2="488" y2="155" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cursed Forest (E) -->
  <rect x="490" y="120" width="100" height="70" rx="8" fill="url(#mid)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="540" y="150" text-anchor="middle" fill="#4ade80" font-family="Orbitron, sans-serif" font-size="12" font-weight="700">Cursed</text>
  <text x="540" y="166" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Forest</text>
  <text x="540" y="182" text-anchor="middle" fill="#a7f3d0" font-size="10">GS 50-68</text>

  <!-- Arrow Dunley → Farbane -->
  <line x1="350" y1="197" x2="350" y2="233" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Farbane (South, starting area) -->
  <rect x="180" y="235" width="240" height="70" rx="8" fill="url(#low)" stroke="#4ade80" stroke-width="2"/>
  <text x="300" y="264" text-anchor="middle" fill="#4ade80" font-family="Orbitron, sans-serif" font-size="14" font-weight="700">Farbane Woods</text>
  <text x="300" y="284" text-anchor="middle" fill="#a7f3d0" font-size="11">GS 0-20 · Starting Area</text>
  <text x="300" y="298" text-anchor="middle" fill="#4ade80" font-size="10">👣 First waygate here</text>

  <!-- Compass -->
  <text x="542" y="32" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700">⬆ N</text>

  <!-- Legend -->
  <rect x="30" y="235" width="130" height="85" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="95" y="256" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">Legend</text>
  <rect x="44" y="266" width="16" height="12" rx="2" fill="url(#gloom)" stroke="#4ade80" stroke-width="1"/>
  <text x="72" y="276" fill="#a7f3d0" font-size="10">High danger zone</text>
  <rect x="44" y="286" width="16" height="12" rx="2" fill="url(#low)" stroke="#4ade80" stroke-width="1"/>
  <text x="72" y="296" fill="#a7f3d0" font-size="10">Safe / starter</text>

  <!-- Footer -->
  <text x="300" y="410" text-anchor="middle" fill="#555" font-size="10">Spatial layout — not to scale. Actual map: mapgenie.io/v-rising</text>
</svg>